<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Билет</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #fff;
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  min-height: 100vh;
}

/* ── FORM ── */
#setup {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 52px 24px 40px;
  background: #fff;
}

#setup h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 28px;
  color: #111;
}

.field { margin-bottom: 18px; }

.field label {
  display: block;
  font-size: 12px;
  color: #999;
  margin-bottom: 6px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .4px;
}

.field input {
  width: 100%;
  padding: 13px 14px;
  border: 1.5px solid #e8e8e8;
  border-radius: 10px;
  font-size: 16px;
  font-family: inherit;
  color: #111;
  background: #fff;
  outline: none;
  -webkit-appearance: none;
}

.field input:focus { border-color: #fc7f1e; }

.swap-row { display: flex; align-items: flex-end; gap: 10px; }
.swap-row .field { flex: 1; margin-bottom: 0; }

.swap-btn {
  background: #f5f5f5;
  border: none;
  border-radius: 10px;
  width: 44px; height: 46px;
  font-size: 20px;
  cursor: pointer;
  flex-shrink: 0;
}

.generate-btn {
  width: 100%;
  padding: 16px;
  background: #fc7f1e;
  color: #fff;
  border: none;
  border-radius: 13px;
  font-size: 17px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  margin-top: 20px;
}

/* ── TICKET ── */
#ticket-view {
  display: none;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: #fff;
  flex-direction: column;
}

/* Header — centered title with bottom border */
.tkt-header {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 52px 16px 14px;
  position: relative;
  border-bottom: 1px solid #f0f0f0;
}

.tkt-back {
  position: absolute;
  left: 16px;
  font-size: 28px;
  color: #333;
  cursor: pointer;
  line-height: 1;
  font-weight: 400;
}

.tkt-title {
  font-size: 18px;
  font-weight: 400;
  color: #000;
}

/* Body — padding matches barcode flush with route text */
.tkt-body { padding: 22px 20px 20px; flex: 1; }

.route-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

/* Route text — normal weight */
.route-text {
  font-size: 20px;
  font-weight: 400;
  color: #000;
  line-height: 1.3;
  flex: 1;
}

/* Orange icon — smaller */
.train-icon {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: #fc7f1e;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

/* Main date — bold (as requested) */
.tkt-date {
  margin-top: 16px;
  font-size: 20px;
  font-weight: 700;
  color: #000;
}

/* Valid until — normal weight, gray */
.tkt-valid {
  margin-top: 3px;
  font-size: 14px;
  font-weight: 400;
  color: #999;
}

/* Barcode — flush with body padding, full width, crisp */
.barcode-wrap {
  margin: 18px -20px 20px -20px;
  cursor: pointer;
  display: block;
  user-select: none;
  -webkit-user-select: none;
}

#barcodeImg {
  width: 100%;
  height: auto;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  -webkit-transform-origin: center center;
  transform-origin: center center;
  will-change: transform;
}

/* Ticket type — normal weight, same gray for both lines */
.tkt-type {
  font-size: 16px;
  font-weight: 400;
  color: #000;
}

.tkt-subtype {
  font-size: 14px;
  font-weight: 400;
  color: #000;
  margin-top: 4px;
  line-height: 1.45;
}

/* Footer */
.tkt-footer {
  padding: 16px 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-top: 1px solid #f0f0f0;
}

.tkt-price {
  font-size: 18px;
  font-weight: 400;
  color: #000;
}

.tkt-number {
  font-size: 13px;
  font-weight: 400;
  color: #999;
}
</style>
</head>
<body>

<!-- FORM -->
<div id="setup">
  <h2>Создать билет</h2>

  <div class="field">
    <label>Откуда</label>
    <input type="text" id="fromStation" placeholder="Начало">
  </div>

  <div class="swap-row">
    <div class="field">
      <label>Куда</label>
      <input type="text" id="toStation" placeholder="Конец">
    </div>
    <button class="swap-btn" onclick="swapStations()">&#8645;</button>
  </div>

  <div class="field" style="margin-top:18px">
    <label>Дата поездки</label>
    <input type="date" id="tripDate">
  </div>

  <button class="generate-btn" onclick="generateTicket()">Создать билет</button>
</div>

<!-- TICKET -->
<div id="ticket-view">
  <div class="tkt-header">
    <span class="tkt-back">&#8592;</span>
    <span class="tkt-title">Билет</span>
  </div>

  <div class="tkt-body">

      <div class="route-text" id="routeText"></div>

          <rect x="14.5" y="10.5" width="6" height="4.5" rx="1" fill="#fc7f1e"/>
          <rect x="12.5" y="10.5" width="1" height="4.5" fill="white"/>
          <rect x="4" y="17" width="18" height="1.5" fill="#fc7f1e" opacity="0.4"/>
          <circle cx="7.5" cy="19.5" r="1.2" fill="white"/>
          <circle cx="18.5" cy="19.5" r="1.2" fill="white"/>
          <rect x="10" y="5.5" width="1.5" height="3.5" rx="0.5" fill="white" opacity="0.9"/>
          <rect x="14.5" y="5.5" width="1.5" height="3.5" rx="0.5" fill="white" opacity="0.9"/>
          <rect x="7.5" y="5" width="11" height="1.2" rx="0.6" fill="white" opacity="0.7"/>
          <rect x="10.5" y="20.5" width="5" height="2" rx="0.8" fill="white" opacity="0.6"/>

      </div>
    </div>

    <div class="tkt-valid" id="ticketValid"></div>

<script>
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function randomTicketNum(){
  var n=''; for(var i=0;i<13;i++) n+=rnd(0,9); return n;
}

function formatRu(d){
  var m=['января','февраля','марта','апреля','мая','июня',
         'июля','августа','сентября','октября','ноября','декабря'];
  return d.getDate()+' '+m[d.getMonth()];
}

function swapStations(){
  var a=document.getElementById('fromStation');
  var b=document.getElementById('toStation');
  var t=a.value; a.value=b.value; b.value=t;
}

(function(){
  var t=new Date();
  document.getElementById('tripDate').value=
    t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
})();

/* 360° spin over 1.2s */
var spinning = false;

function doFlip(){
  if(spinning) return;
  spinning = true;
  var img = document.getElementById('barcodeImg');
  var start = null;
  var dur = 1200;

  function easeInOut(t){ return t<.5 ? 2*t*t : -1+(4-2*t)*t; }

  function step(ts){
    if(!start) start = ts;
    var p = Math.min((ts - start) / dur, 1);
    var deg = easeInOut(p) * 360;
    img.style.webkitTransform = 'perspective(800px) rotateY('+deg+'deg)';
    img.style.transform       = 'perspective(800px) rotateY('+deg+'deg)';
    if(p < 1){
      requestAnimationFrame(step);
    } else {
      img.style.webkitTransform = '';
      img.style.transform = '';
      spinning = false;
    }
  }
  requestAnimationFrame(step);
}

window.addEventListener('DOMContentLoaded', function(){
  var wrap = document.getElementById('barcodeWrap');
  if(!wrap) return;
  wrap.addEventListener('click', doFlip);
  wrap.addEventListener('touchend', function(e){
    e.preventDefault();
    doFlip();
  }, {passive: false});
});

function generateTicket(){
  var from = document.getElementById('fromStation').value.trim() || 'Откуда';
  var to   = document.getElementById('toStation').value.trim()   || 'Куда';
  var dv   = document.getElementById('tripDate').value;
  if(!dv){ alert('Выберите дату'); return; }

  var d1 = new Date(dv + 'T12:00:00');
  var d2 = new Date(d1); d2.setDate(d2.getDate()+1);

  document.getElementById('routeText').textContent = from + ' — ' + to;
  document.getElementById('ticketDate').textContent = formatRu(d1);
  document.getElementById('ticketValid').textContent = 'Действует до 01:00 ' + formatRu(d2);
  document.getElementById('ticketNumber').textContent = 'Билет № ' + randomTicketNum();

  document.getElementById('setup').style.display = 'none';
  var tv = document.getElementById('ticket-view');
  tv.style.display = 'flex';
  window.scrollTo(0,0);
}
</script>
