<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Билет</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: #fff;
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  min-height: 100vh;
}

/* ── SETUP FORM ── */
#setup {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 52px 24px 40px;
  background: #fff;
}

#setup h2 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 28px;
  color: #111;
}

.field { margin-bottom: 18px; }

.field label {
  display: block;
  font-size: 12px;
  color: #999;
  margin-bottom: 6px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: .4px;
}

.field input {
  width: 100%;
  padding: 13px 14px;
  border: 1.5px solid #e8e8e8;
  border-radius: 10px;
  font-size: 16px;
  font-family: inherit;
  color: #111;
  background: #fff;
  outline: none;
  -webkit-appearance: none;
}

.field input:focus { border-color: #fc7f1e; }

.swap-row { display: flex; align-items: flex-end; gap: 10px; }
.swap-row .field { flex: 1; margin-bottom: 0; }

.swap-btn {
  background: #f5f5f5;
  border: none;
  border-radius: 10px;
  width: 44px; height: 46px;
  font-size: 20px;
  cursor: pointer;
  flex-shrink: 0;
}

.generate-btn {
  width: 100%;
  padding: 16px;
  background: #fc7f1e;
  color: #fff;
  border: none;
  border-radius: 13px;
  font-size: 17px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  margin-top: 20px;
}

/* ── TICKET VIEW ── */
#ticket-view {
  display: none;
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  background: #fff;
  flex-direction: column;
}

.tkt-header {
  display: flex;
  align-items: center;
  padding: 52px 16px 14px;
}

.tkt-back {
  font-size: 28px;
  color: #333;
  margin-right: 10px;
  cursor: pointer;
  line-height: 1;
}

.tkt-title {
  font-size: 18px;
  font-weight: 600;
  color: #000;
}

.tkt-body { padding: 22px 20px 20px; flex: 1; }

.route-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.route-text {
  font-size: 20px;
  font-weight: 700;
  color: #000;
  line-height: 1.3;
  flex: 1;
}

/* TRAIN ICON — orange circle */
.train-icon {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: #fc7f1e;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}

.tkt-date {
  margin-top: 18px;
  font-size: 20px;
  font-weight: 700;
  color: #000;
}

.tkt-valid {
  margin-top: 3px;
  font-size: 14px;
  color: #999;
}

/* BARCODE */
.barcode-wrap {
  margin: 20px 0 22px;
  cursor: pointer;
  -webkit-perspective: 800px;
  perspective: 800px;
  -webkit-transform-style: preserve-3d;
  transform-style: preserve-3d;
}

#barcodeCanvas {
  width: 100%;
  height: auto;
  display: block;
  -webkit-transform-origin: center center;
  transform-origin: center center;
  will-change: transform;
}

.tkt-type {
  font-size: 16px;
  font-weight: 600;
  color: #000;
}

.tkt-subtype {
  font-size: 14px;
  color: #999;
  margin-top: 4px;
  line-height: 1.45;
}

.tkt-footer {
  padding: 16px 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-top: 1px solid #f0f0f0;
}

.tkt-price { font-size: 18px; font-weight: 700; color: #000; }
.tkt-number { font-size: 13px; color: #999; }
</style>
</head>
<body>

<!-- FORM -->
<div id="setup">
  <h2>Создать билет</h2>

  <div class="field">
    <label>Откуда</label>
    <input type="text" id="fromStation" value="Санкт-Петербург (Московский вокзал)">
  </div>

  <div class="swap-row">
    <div class="field">
      <label>Куда</label>
      <input type="text" id="toStation" value="Фарфоровская">
    </div>
    <button class="swap-btn" onclick="swapStations()">⇅</button>
  </div>

  <div class="field" style="margin-top:18px">
    <label>Дата поездки</label>
    <input type="date" id="tripDate">
  </div>

  <button class="generate-btn" onclick="generateTicket()">Создать билет</button>
</div>

<!-- TICKET -->
<div id="ticket-view">
  <div class="tkt-header">
    <span class="tkt-back">←</span>
    <span class="tkt-title">Билет</span>
  </div>

  <div class="tkt-body">
    <div class="route-row">
      <div class="route-text" id="routeText"></div>
      <!-- Orange circle with white front-view EMU train icon -->
      <div class="train-icon">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Front cab body -->
          <rect x="4" y="8" width="18" height="12" rx="3" fill="white"/>
          <!-- Cab windshield - two rectangular windows side by side -->
          <rect x="6" y="10" width="6" height="5" rx="1" fill="#fc7f1e"/>
          <rect x="14" y="10" width="6" height="5" rx="1" fill="#fc7f1e"/>
          <!-- Center divider -->
          <rect x="12.5" y="10" width="1" height="5" fill="white"/>
          <!-- Bottom stripe -->
          <rect x="4" y="17" width="18" height="2" rx="0" fill="#fc7f1e" opacity="0.35"/>
          <!-- Headlights -->
          <circle cx="7.5" cy="19" r="1.2" fill="#ffe082"/>
          <circle cx="18.5" cy="19" r="1.2" fill="#ffe082"/>
          <!-- Wheels -->
          <rect x="5" y="20" width="5" height="2" rx="1" fill="white" opacity="0.7"/>
          <rect x="16" y="20" width="5" height="2" rx="1" fill="white" opacity="0.7"/>
          <!-- Coupler -->
          <rect x="11" y="22" width="4" height="2" rx="1" fill="white" opacity="0.5"/>
          <!-- Pantograph (top) -->
          <rect x="10" y="5" width="1.5" height="3" fill="white" opacity="0.8"/>
          <rect x="14.5" y="5" width="1.5" height="3" fill="white" opacity="0.8"/>
          <rect x="8" y="4.5" width="10" height="1" rx=".5" fill="white" opacity="0.6"/>
        </svg>
      </div>
    </div>

    <div class="tkt-date" id="ticketDate"></div>
    <div class="tkt-valid" id="ticketValid"></div>

    <!-- Barcode — click/tap to spin -->
    <div class="barcode-wrap" id="barcodeWrap">
      <canvas id="barcodeCanvas" width="420" height="120"></canvas>
    </div>

    <div class="tkt-type">Полный, в одну сторону</div>
    <div class="tkt-subtype" id="ticketSubtype">Билет на электричку «Ласточка»</div>
  </div>

  <div class="tkt-footer">
    <div class="tkt-price">65 ₽</div>
    <div class="tkt-number" id="ticketNumber"></div>
  </div>
</div>

<script>
// ── utils ──
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function randomTicketNum(){
  var n=''; for(var i=0;i<13;i++) n+=rnd(0,9); return n;
}

function formatRu(d){
  var m=['января','февраля','марта','апреля','мая','июня',
         'июля','августа','сентября','октября','ноября','декабря'];
  return d.getDate()+' '+m[d.getMonth()];
}

function swapStations(){
  var a=document.getElementById('fromStation');
  var b=document.getElementById('toStation');
  var t=a.value; a.value=b.value; b.value=t;
}

// default date = today
(function(){
  var t=new Date();
  document.getElementById('tripDate').value=
    t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
})();

// ── BARCODE ──
// Reproduces the style from the photo:
// solid-bar guards | 2D matrix | thin bars | 2D matrix | thin bars | 2D matrix | solid-bar guards
function drawBarcode(cv){
  var ctx=cv.getContext('2d');
  var W=cv.width, H=cv.height;
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);

  // Section widths (pixels, sum = W = 420)
  var sections=[
    {k:'guard',  w:52},
    {k:'matrix', w:108},
    {k:'sep',    w:36},
    {k:'matrix', w:108},
    {k:'sep',    w:28},
    {k:'matrix', w:88},
  ];

  var x=0;
  for(var i=0;i<sections.length;i++){
    var s=sections[i];
    if(s.k==='guard')  drawGuard(ctx,x,0,s.w,H);
    else if(s.k==='sep') drawSep(ctx,x,0,s.w,H);
    else                 drawMatrix(ctx,x,0,s.w,H);
    x+=s.w;
  }
  // Right guard
  drawGuard(ctx,x,0,W-x,H);

  // Top + bottom full-width solid bars
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,5);
  ctx.fillRect(0,H-5,W,5);
}

function drawGuard(ctx,ox,oy,w,h){
  ctx.fillStyle='#000';
  // Pattern of bars that mimics real barcode guard bars
  // widths of bars and gaps (alternating bar/gap)
  var pat=[5,2,3,2,8,2,4,3,6,2,3,2,5,2,8,3,4,2,6,2];
  var x=ox, pi=0, drawBar=true;
  while(x<ox+w){
    var bw=pat[pi%pat.length];
    if(drawBar) ctx.fillRect(x,oy,Math.min(bw,ox+w-x),h);
    x+=bw; pi++; drawBar=!drawBar;
  }
}

function drawSep(ctx,ox,oy,w,h){
  ctx.fillStyle='#000';
  var pat=[4,3,6,3,4,3,5,2,4];
  var x=ox, pi=0, drawBar=true;
  while(x<ox+w){
    var bw=pat[pi%pat.length];
    if(drawBar) ctx.fillRect(x,oy,Math.min(bw,ox+w-x),h);
    x+=bw; pi++; drawBar=!drawBar;
  }
}

function drawMatrix(ctx,ox,oy,w,h){
  var cell=5;
  var cols=Math.floor(w/cell);
  var rows=Math.floor(h/cell);
  ctx.fillStyle='#000';
  for(var r=0;r<rows;r++){
    for(var c=0;c<cols;c++){
      // structured density: use wave + noise to mimic real 2D barcode patterns
      var v=0.5
        +0.18*Math.sin(c*0.85+r*0.4+ox*0.01)
        +0.12*Math.cos(r*0.75+c*0.55)
        +(Math.random()-0.5)*0.45;
      if(v>0.5){
        ctx.fillRect(ox+c*cell, oy+r*cell, cell, cell);
      }
    }
  }
}

// ── FLIP ANIMATION (rAF-based, works on all devices) ──
var _spinning=false;

function startFlip(){
  if(_spinning) return;
  _spinning=true;
  var cv=document.getElementById('barcodeCanvas');
  var total=720; // degrees
  var dur=1100;  // ms
  var start=null;

  function ease(t){ return t<.5?2*t*t:-1+(4-2*t)*t; } // easeInOut

  function step(ts){
    if(!start) start=ts;
    var elapsed=ts-start;
    var progress=Math.min(elapsed/dur,1);
    var deg=ease(progress)*total;
    cv.style.transform='rotateY('+deg+'deg)';
    if(progress<1){
      requestAnimationFrame(step);
    } else {
      cv.style.transform='rotateY(0deg)';
      _spinning=false;
    }
  }
  requestAnimationFrame(step);
}

// attach events after DOM ready
window.addEventListener('DOMContentLoaded',function(){
  var wrap=document.getElementById('barcodeWrap');
  wrap.addEventListener('click', startFlip);
  wrap.addEventListener('touchend', function(e){
    e.preventDefault();
    startFlip();
  }, {passive:false});
});

// ── GENERATE ──
function generateTicket(){
  var from=document.getElementById('fromStation').value.trim()||'Откуда';
  var to=document.getElementById('toStation').value.trim()||'Куда';
  var dv=document.getElementById('tripDate').value;
  if(!dv){ alert('Выберите дату'); return; }

  var d1=new Date(dv+'T12:00:00');
  var d2=new Date(d1); d2.setDate(d2.getDate()+1);

  document.getElementById('routeText').textContent=from+' — '+to;
  document.getElementById('ticketDate').textContent=formatRu(d1);
  document.getElementById('ticketValid').textContent='Действует до 01:00 '+formatRu(d2);
  document.getElementById('ticketNumber').textContent='Билет № '+randomTicketNum();

  drawBarcode(document.getElementById('barcodeCanvas'));

  document.getElementById('setup').style.display='none';
  var tv=document.getElementById('ticket-view');
  tv.style.display='flex';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
