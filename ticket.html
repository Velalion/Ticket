<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Билет</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8e8e8;
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px 16px 40px;
  }

  /* ── SETUP FORM ── */
  #setup {
    background: #fff;
    border-radius: 18px;
    padding: 28px 24px 32px;
    width: 100%;
    max-width: 390px;
    box-shadow: 0 2px 20px rgba(0,0,0,.10);
  }

  #setup h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 22px;
    color: #111;
    letter-spacing: -.3px;
  }

  .field { margin-bottom: 18px; }

  .field label {
    display: block;
    font-size: 13px;
    color: #888;
    margin-bottom: 6px;
    font-weight: 500;
    letter-spacing: .1px;
  }

  .field input, .field select {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 12px;
    font-size: 16px;
    font-family: inherit;
    color: #111;
    background: #fafafa;
    outline: none;
    transition: border-color .15s;
  }

  .field input:focus, .field select:focus {
    border-color: #fc7f1e;
    background: #fff;
  }

  .direction-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .direction-row input {
    flex: 1;
  }

  .swap-btn {
    background: #f2f2f2;
    border: none;
    border-radius: 10px;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: #555;
    transition: background .15s;
    flex-shrink: 0;
    margin-top: 0;
  }

  .swap-btn:hover { background: #e8e8e8; }

  .generate-btn {
    width: 100%;
    padding: 15px;
    background: #fc7f1e;
    color: #fff;
    border: none;
    border-radius: 13px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    letter-spacing: -.1px;
    transition: opacity .15s, transform .1s;
    margin-top: 6px;
  }

  .generate-btn:hover { opacity: .92; }
  .generate-btn:active { transform: scale(.98); }

  /* ── PHONE FRAME ── */
  #phone-wrap {
    display: none;
    width: 100%;
    max-width: 393px;
    margin-top: 0;
  }

  .phone {
    background: #f2f2f7;
    border-radius: 54px;
    padding: 14px 12px;
    box-shadow:
      0 0 0 1px #c8c8c8,
      0 20px 60px rgba(0,0,0,.25),
      inset 0 0 0 2px #fff;
    position: relative;
  }

  .phone-inner {
    background: #f2f2f7;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
  }

  /* Status bar */
  .status-bar {
    background: #f2f2f7;
    padding: 14px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
    z-index: 10;
  }

  .status-time {
    font-size: 15px;
    font-weight: 600;
    color: #000;
    letter-spacing: -.2px;
  }

  .status-icons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-icons svg { color: #000; }

  /* Dynamic island */
  .island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: #000;
    width: 120px;
    height: 34px;
    border-radius: 20px;
    z-index: 20;
  }

  /* Nav bar */
  .nav-bar {
    background: #f2f2f7;
    padding: 12px 20px 8px;
    display: flex;
    align-items: center;
    border-bottom: .5px solid #e0e0e0;
  }

  .back-btn {
    font-size: 17px;
    color: #007aff;
    margin-right: 10px;
    cursor: pointer;
  }

  .nav-title {
    font-size: 17px;
    font-weight: 600;
    color: #000;
    flex: 1;
    text-align: center;
    margin-right: 24px;
    letter-spacing: -.2px;
  }

  /* Ticket content */
  .ticket-body {
    background: #fff;
    margin: 0;
    padding: 22px 20px 0;
    min-height: 580px;
  }

  .route {
    font-size: 22px;
    font-weight: 700;
    color: #000;
    line-height: 1.25;
    letter-spacing: -.4px;
    padding-right: 40px;
    position: relative;
  }

  .route-icon {
    position: absolute;
    top: 0;
    right: 0;
    width: 38px;
    height: 38px;
    background: #fc7f1e;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .route-icon svg {
    width: 20px;
    height: 20px;
    fill: #fff;
  }

  .ticket-date {
    margin-top: 16px;
    font-size: 22px;
    font-weight: 700;
    color: #000;
    letter-spacing: -.3px;
  }

  .ticket-valid {
    margin-top: 3px;
    font-size: 14px;
    color: #8e8e93;
    font-weight: 400;
  }

  /* Barcode canvas */
  .barcode-wrap {
    margin: 20px 0 18px;
  }

  #barcodeCanvas {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 4px;
  }

  .ticket-type {
    font-size: 15px;
    font-weight: 600;
    color: #000;
    letter-spacing: -.1px;
  }

  .ticket-subtype {
    font-size: 14px;
    color: #8e8e93;
    margin-top: 2px;
  }

  /* Bottom bar */
  .ticket-footer {
    background: #fff;
    padding: 16px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-top: .5px solid #e0e0e0;
  }

  .ticket-price {
    font-size: 17px;
    font-weight: 600;
    color: #000;
  }

  .ticket-number {
    font-size: 13px;
    color: #8e8e93;
    text-align: right;
  }

  /* Bottom tab bar */
  .tab-bar {
    background: rgba(242,242,247,.95);
    backdrop-filter: blur(10px);
    padding: 12px 20px 20px;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: .5px solid #d0d0d0;
  }

  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    position: relative;
  }

  .tab-item svg {
    width: 26px;
    height: 26px;
    color: #8e8e93;
  }

  .tab-item.active svg { color: #fc7f1e; }

  .tab-badge {
    position: absolute;
    top: -4px;
    right: -6px;
    background: #ff3b30;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid #f2f2f7;
  }

  /* Regen button */
  #regenBtn {
    display: none;
    margin-top: 20px;
    background: #fff;
    border: 1.5px solid #fc7f1e;
    color: #fc7f1e;
    padding: 13px;
    border-radius: 13px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    width: 100%;
    max-width: 393px;
    transition: background .15s;
  }

  #regenBtn:hover { background: #fff7f0; }

  #backToForm {
    display: none;
    margin-top: 10px;
    background: transparent;
    border: 1.5px solid #ccc;
    color: #555;
    padding: 13px;
    border-radius: 13px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    width: 100%;
    max-width: 393px;
  }

  #backToForm:hover { border-color: #999; }
</style>
</head>
<body>

<!-- SETUP FORM -->
<div id="setup">
  <h2>Новый билет</h2>

  <div class="field">
    <label>Откуда</label>
    <input type="text" id="fromStation" value="Балтийский вокзал" placeholder="Станция отправления">
  </div>

  <div class="field">
    <label>Куда</label>
    <div class="direction-row">
      <input type="text" id="toStation" value="Сергиево (Володарская)" placeholder="Станция назначения">
      <button class="swap-btn" onclick="swapStations()" title="Поменять местами">⇅</button>
    </div>
  </div>

  <div class="field">
    <label>Дата поездки</label>
    <input type="date" id="tripDate">
  </div>

  <button class="generate-btn" onclick="generateTicket()">Создать билет</button>
</div>

<!-- PHONE -->
<div id="phone-wrap">
  <div class="phone">
    <div class="phone-inner">

      <!-- Status bar -->
      <div class="status-bar">
        <span class="status-time" id="statusTime">21:49</span>
        <div style="width:34px"></div><!-- spacer for island -->
        <div class="status-icons">
          <!-- signal bars -->
          <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
            <rect x="0" y="8" width="3" height="4" rx=".5" fill="#000"/>
            <rect x="4.5" y="5" width="3" height="7" rx=".5" fill="#000"/>
            <rect x="9" y="2" width="3" height="10" rx=".5" fill="#000"/>
            <rect x="13.5" y="0" width="3" height="12" rx=".5" fill="#000" opacity=".3"/>
          </svg>
          <!-- wifi -->
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M8 9.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3z" fill="#000"/>
            <path d="M8 6C5.8 6 3.8 6.9 2.3 8.4L1 7.1A8.9 8.9 0 018 4a8.9 8.9 0 017 3.1L13.7 8.4C12.2 6.9 10.2 6 8 6z" fill="#000"/>
            <path d="M8 2C4.7 2 1.7 3.4 0 5.5L1.3 6.8A8 8 0 018 3a8 8 0 016.7 3.8L16 5.5A11 11 0 008 2z" fill="#000"/>
          </svg>
          <!-- battery -->
          <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
            <rect x=".5" y=".5" width="21" height="11" rx="3.5" stroke="#000" stroke-opacity=".35"/>
            <rect x="1.5" y="1.5" width="18" height="9" rx="2.5" fill="#000"/>
            <path d="M23 4v4a2 2 0 000-4z" fill="#000" opacity=".4"/>
          </svg>
        </div>
      </div>

      <!-- Dynamic island -->
      <div class="island"></div>

      <!-- Nav -->
      <div class="nav-bar">
        <span class="back-btn">‹</span>
        <span class="nav-title">Билет</span>
      </div>

      <!-- Ticket body -->
      <div class="ticket-body">
        <div class="route" id="routeText">
          Балтийский вокзал – Сергиево (Володарская)
          <div class="route-icon">
            <!-- train icon -->
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9v8l3 3h8l3-3V9c0-3.87-3.13-7-7-7zm0 2c2.76 0 5 2.24 5 5v6H7V9c0-2.76 2.24-5 5-5zM9 18h6l1.5 1.5H7.5L9 18zm3-9a2 2 0 100 4 2 2 0 000-4zM9 9h2v2H9V9zm4 0h2v2h-2V9z"/></svg>
          </div>
        </div>

        <div class="ticket-date" id="ticketDate">23 июня</div>
        <div class="ticket-valid" id="ticketValid">Действует до 01:00 24 июня</div>

        <div class="barcode-wrap">
          <canvas id="barcodeCanvas" width="700" height="180"></canvas>
        </div>

        <div class="ticket-type">Полный, в одну сторону</div>
        <div class="ticket-subtype">Билет на электричку «Ласточка»</div>
      </div>

      <div class="ticket-footer">
        <div class="ticket-price">65 ₽</div>
        <div class="ticket-number" id="ticketNumber">Билет № 3682591086784</div>
      </div>

      <!-- Tab bar -->
      <div class="tab-bar">
        <!-- Trips -->
        <div class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 12C3 7 7 3 12 3s9 4 9 9-4 9-9 9" stroke-linecap="round"/>
            <path d="M3 12h4" stroke-linecap="round"/>
          </svg>
        </div>
        <!-- Saved -->
        <div class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M5 5h14a1 1 0 011 1v13l-7-4-7 4V6a1 1 0 011-1z" stroke-linejoin="round"/>
          </svg>
        </div>
        <!-- Tickets (active) -->
        <div class="tab-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="5" width="18" height="14" rx="2"/>
            <path d="M3 10h18M8 14h2M13 14h3" stroke-linecap="round"/>
          </svg>
          <div class="tab-badge">1</div>
        </div>
        <!-- Schedule -->
        <div class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="9"/>
            <path d="M12 7v5l3 3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <!-- Settings -->
        <div class="tab-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

    </div><!-- /phone-inner -->
  </div><!-- /phone -->
</div><!-- /phone-wrap -->

<button id="regenBtn" onclick="regenerate()">🔄 Новый номер и штрихкод</button>
<button id="backToForm" onclick="showForm()">← Изменить маршрут / дату</button>

<script>
// ── Utilities ──
function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function randomTicketNumber() {
  let n = '';
  for (let i = 0; i < 13; i++) n += rnd(0, 9);
  return n;
}

function formatDateRu(d) {
  const months = ['января','февраля','марта','апреля','мая','июня',
                  'июля','августа','сентября','октября','ноября','декабря'];
  return d.getDate() + ' ' + months[d.getMonth()];
}

function swapStations() {
  const a = document.getElementById('fromStation');
  const b = document.getElementById('toStation');
  [a.value, b.value] = [b.value, a.value];
}

// Set default date to today
(function() {
  const today = new Date();
  const yyyy = today.getFullYear();
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const dd = String(today.getDate()).padStart(2,'0');
  document.getElementById('tripDate').value = `${yyyy}-${mm}-${dd}`;
})();

// ── Barcode generator ──
// Draws a realistic-looking Aztec / 2D barcode (purely decorative)
function drawAztecLike(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0,0,W,H);

  // We'll tile 4 sections like the real Aztec code in the photo
  // Each section has its own pattern
  const sections = 4;
  const secW = W / sections;
  const cellSize = 7; // px per "bit"

  for (let s = 0; s < sections; s++) {
    const ox = s * secW;
    const cols = Math.floor(secW / cellSize);
    const rows = Math.floor(H / cellSize);

    // Each section: random noise with some structure
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        // Density varies across sections and adds structure
        const density = .45 + .15 * Math.sin(c * .4 + s) * Math.cos(r * .35 + s * 1.2);
        if (Math.random() < density) {
          ctx.fillStyle = '#000';
          ctx.fillRect(ox + c * cellSize, r * cellSize, cellSize - 1, cellSize - 1);
        }
      }
    }

    // Add vertical bar-like separators between sections (like in photo)
    if (s < sections - 1) {
      ctx.fillStyle = '#000';
      for (let y = 0; y < H; y += cellSize * 2) {
        ctx.fillRect(ox + secW - cellSize, y, cellSize, cellSize);
      }
    }

    // Add some horizontal bands of solid black (finder pattern feel)
    if (s === 0 || s === sections - 1) {
      ctx.fillStyle = '#000';
      ctx.fillRect(ox, 0, cellSize * 2, H); // left/right solid edge
    }
  }

  // Top & bottom solid lines
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, cellSize);
  ctx.fillRect(0, H - cellSize, W, cellSize);
}

// ── Main ──
function generateTicket() {
  const from  = document.getElementById('fromStation').value.trim() || 'Станция А';
  const to    = document.getElementById('toStation').value.trim()   || 'Станция Б';
  const dateV = document.getElementById('tripDate').value;

  if (!dateV) { alert('Выберите дату'); return; }

  const tripDate = new Date(dateV + 'T12:00:00');
  const nextDate = new Date(tripDate);
  nextDate.setDate(nextDate.getDate() + 1);

  // Fill ticket data
  document.getElementById('routeText').childNodes[0].textContent =
    `${from} – ${to} `;

  document.getElementById('ticketDate').textContent = formatDateRu(tripDate);
  document.getElementById('ticketValid').textContent =
    `Действует до 01:00 ${formatDateRu(nextDate)}`;

  // Status bar time = current time
  const now = new Date();
  document.getElementById('statusTime').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');

  // Ticket number
  document.getElementById('ticketNumber').textContent =
    'Билет № ' + randomTicketNumber();

  // Barcode
  drawAztecLike(document.getElementById('barcodeCanvas'));

  // Show phone
  document.getElementById('setup').style.display = 'none';
  document.getElementById('phone-wrap').style.display = 'block';
  document.getElementById('regenBtn').style.display  = 'block';
  document.getElementById('backToForm').style.display = 'block';
}

function regenerate() {
  document.getElementById('ticketNumber').textContent =
    'Билет № ' + randomTicketNumber();
  drawAztecLike(document.getElementById('barcodeCanvas'));
}

function showForm() {
  document.getElementById('setup').style.display = 'block';
  document.getElementById('phone-wrap').style.display = 'none';
  document.getElementById('regenBtn').style.display  = 'none';
  document.getElementById('backToForm').style.display = 'none';
}
</script>
</body>
</html>
